default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: admin
  password: password
  host: localhost
  port: 5432

development:
  <<: *default
  database: paychecq_development

test:
  <<: *default
  database: paychecq_test

production:
  primary: &primary_production
    <<: *default
    database: paychecq_production
    username: paychecq
    password: <%= ENV["PAYCHECQ_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: paychecq_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: paychecq_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: paychecq_production_cable
    migrations_paths: db/cable_migrate
