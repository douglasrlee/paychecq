plugins:
  - rubocop-rails
  - rubocop-capybara

AllCops:
  NewCops: enable

Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: space
Layout/LineLength:
  Enabled: false

Style/Documentation:
  Enabled: false
Style/SymbolArray:
  EnforcedStyle: brackets
Style/ClassAndModuleChildren:
  EnforcedStyle: compact

Metrics/BlockLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
