require:
  - rubocop-rails
  - rubocop-minitest
  - rubocop-capybara

AllCops:
  NewCops: enable

Style/Documentation:
  Enabled: false
Style/SymbolArray:
  EnforcedStyle: brackets

Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: space
Layout/LineLength:
  Enabled: false

Metrics/BlockLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
